# enable zmk studio for realtime keymap updates
# CONFIG_ZMK_STUDIO=y
# CONFIG_ZMK_STUDIO_LOCKING=n

# conf BLE
CONFIG_ZMK_BLE=y
# CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=1
# CONFIG_BT_MAX_PAIRED=5 # detrimental for parts in dongle build
CONFIG_BT_BAS=y # useless for parts in dongle build

# Experimental: BLE improvements
# CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y

# improve the BLE with experimental features
# CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# fetch the periph battery level to the host
# CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
# CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# enable deep sleep support
CONFIG_ZMK_SLEEP=n

# the keyboard disconnects from bluetooth.
# uses very little power, but it may take
# a few seconds to reconnect after waking.
# 1.800.000 ms = 30 minutes
# 60000 ms = 1 minute
# CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=600000

# enable soft off behavior
# https://zmk.dev/docs/config/power#soft-off
# CONFIG_ZMK_PM_SOFT_OFF=y

# change BLE power because split parts sometime
# disconnect from another
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# explicitely reports battery levels
# CONFIG_ZMK_BATTERY_REPORTING=y # depr in main

# Screens (DONGLE)
# CONFIG_ZMK_DONGLE_DISPLAY_DONGLE_BATTERY=y
# CONFIG_ZMK_DONGLE_DISPLAY_MAC_MODIFIERS=y
